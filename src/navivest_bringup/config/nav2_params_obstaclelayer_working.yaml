amcl:
  ros__parameters:
    use_sim_time: false

map_server:
  ros__parameters:
    use_sim_time: false
    yaml_filename: ""

planner_server:
  ros__parameters:
    use_sim_time: false
    expected_planner_frequency: 5.0
    planner_plugins:
      - GridBased

    GridBased:
      plugin: "nav2_theta_star_planner/ThetaStarPlanner"
      how_many_corners: 8
      w_euc_cost: 1.0
      w_traversal_cost: 2.0
      w_heuristic_cost: 1.0

controller_server:
  ros__parameters:
    use_sim_time: false
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001

    progress_checker_plugin: "progress_checker"
    goal_checker_plugins:
      - general_goal_checker
    controller_plugins:
      - FollowPath

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.0
      movement_time_allowance: 999.0

    general_goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      xy_goal_tolerance: 0.35
      yaw_goal_tolerance: 0.5

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false
      min_vel_x: 0.0
      max_vel_x: 0.7
      max_vel_theta: 1.0
      min_speed_xy: 0.0
      max_speed_xy: 0.7
      min_speed_theta: 0.0
      acc_lim_x: 0.8
      acc_lim_theta: 1.5
      decel_lim_x: -0.8
      decel_lim_theta: -1.5
      vx_samples: 20
      vtheta_samples: 20
      sim_time: 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.35
      trans_stopped_velocity: 0.1
      short_circuit_trajectory_evaluation: true
      critics:
        - RotateToGoal
        - Oscillation
        - ObstacleFootprint
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 5.0
      publish_frequency: 2.0
      transform_tolerance: 2.0
      rolling_window: true
      always_send_full_costmap: true

      width: 5
      height: 5
      resolution: 0.05
      robot_radius: 0.25
      track_unknown_space: false

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: zed_cloud

        zed_cloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          sensor_frame: zed_left_camera_frame
          data_type: PointCloud2
          marking: true
          clearing: false

          # Wide near-floor test band.
          # Tune after confirming low objects appear.
          min_obstacle_height: -1.5
          max_obstacle_height: 0.3

          obstacle_min_range: 0.2
          obstacle_max_range: 4.0
          raytrace_min_range: 0.2
          raytrace_max_range: 5.0
          observation_persistence: 0.5
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 3.0

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: false
      global_frame: odom
      robot_base_frame: base_link
      update_frequency: 2.0
      publish_frequency: 1.0
      transform_tolerance: 2.0
      rolling_window: true
      always_send_full_costmap: true

      width: 6
      height: 6
      resolution: 0.10
      robot_radius: 0.25
      track_unknown_space: false

      plugins:
        - obstacle_layer
        - inflation_layer

      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: zed_cloud

        zed_cloud:
          topic: /zed/zed_node/point_cloud/cloud_registered
          sensor_frame: zed_left_camera_frame
          data_type: PointCloud2
          marking: true
          clearing: false

          min_obstacle_height: -1.5
          max_obstacle_height: 0.3

          obstacle_min_range: 0.2
          obstacle_max_range: 4.0
          raytrace_min_range: 0.2
          raytrace_max_range: 5.0
          observation_persistence: 0.5
          expected_update_rate: 0.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.35
        cost_scaling_factor: 5.0

bt_navigator:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /zed/zed_node/odom
    bt_loop_duration: 10
    default_server_timeout: 20

behavior_server:
  ros__parameters:
    use_sim_time: false
    global_frame: odom
    robot_base_frame: base_link
    cycle_frequency: 10.0

waypoint_follower:
  ros__parameters:
    use_sim_time: false

velocity_smoother:
  ros__parameters:
    use_sim_time: false
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    odom_topic: /zed/zed_node/odom

    max_velocity:
      - 0.7
      - 0.0
      - 1.0

    min_velocity:
      - 0.0
      - 0.0
      - -1.0

    max_accel:
      - 0.8
      - 0.0
      - 1.5

    max_decel:
      - -0.8
      - 0.0
      - -1.5
