# config/zed2i_yaml
# Parameters for Stereolabs zed2i camera

---
/**:
    ros__parameters:
        general:
            camera_model: 'zed2i'
            camera_name: 'zed2i' # overwritten by launch file
            grab_resolution: 'HD720' # The native camera grab resolution. 'HD2K', 'HD1080', 'HD720', 'VGA', 'AUTO'
            grab_frame_rate: 60 # ZED SDK internal grabbing rate
            pub_frame_rate: 60.0 # Publish images/depth as fast as the 60 FPS grab stream allows
            use_pub_timestamps: true
        video:
            brightness: 4 # [DYNAMIC] Image brightness. Range: 0-8
            contrast: 4 # [DYNAMIC] Image contrast. Range: 0-8
            hue: 0 # [DYNAMIC] Image hue. Range: 0 to 11

        depth:
            depth_mode: 'NEURAL_LIGHT'
            depth_stabilization: 0
            min_depth: 0.01 # Min: 0.01, Max: 3.0
            max_depth: 15.0 # Min: 0.5, Max: 20.0
            point_cloud_freq: 30.0 # RTX 4060 target for navigation point cloud updates
            point_cloud_res: 'REDUCED'
            publish_point_cloud: true
        pos_tracking:
            pos_tracking_enabled: false
            imu_fusion: true
            floor_alignment: false
