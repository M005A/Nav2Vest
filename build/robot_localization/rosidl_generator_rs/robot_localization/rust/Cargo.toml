[package]
name = "robot_localization"
version = "3.8.3"
edition = "2021"

[dependencies]
rosidl_runtime_rs = "0.6"
serde = { version = "1", optional = true, features = ["derive"] }
serde-big-array = { version = "0.5.1", optional = true }

# ROS Dependencies
geographic_msgs = "*"
service_msgs = "*"
geometry_msgs = "*"
builtin_interfaces = "*"
unique_identifier_msgs = "*"
std_msgs = "*"

[features]
serde = ['dep:serde', 'dep:serde-big-array', 'rosidl_runtime_rs/serde', 'geographic_msgs/serde', 'service_msgs/serde', 'geometry_msgs/serde', 'builtin_interfaces/serde', 'unique_identifier_msgs/serde', 'std_msgs/serde']

[package.metadata.rclrs]
reexport = true
